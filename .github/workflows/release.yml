name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-extension:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Prepare release artifact
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE_BASENAME="y-txt-v${VERSION}-extension"
          STAGING_DIR="dist-release/${ARCHIVE_BASENAME}"

          mkdir -p "$STAGING_DIR"
          cp -R dist/. "$STAGING_DIR/"
          cp README.md "$STAGING_DIR/README.md"
          cp INSTALL.md "$STAGING_DIR/INSTALL.md"

          mkdir -p release
          (
            cd dist-release
            zip -r "../release/${ARCHIVE_BASENAME}.zip" "${ARCHIVE_BASENAME}"
          )
          sha256sum "release/${ARCHIVE_BASENAME}.zip" > "release/${ARCHIVE_BASENAME}.zip.sha256"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release/*.zip
            release/*.sha256

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v6
        with:
          name: y-txt-extension
          path: |
            release/*.zip
            release/*.sha256
